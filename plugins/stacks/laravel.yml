name: laravel
display_name: "Laravel"
description: "Laravel framework with PHP + Nginx"
version: "1.0.0"
author: TAVP Team
category: stack
icon: "🟥"

components:
  php:
    label: "PHP Version"
    type: select
    versions:
      - "8.1"
      - "8.2"
      - "8.3"
      - "8.4"
    default: "8.3"
    required: true

preset:
  php: "8.3"

provision: scripts/stacks/laravel.sh

env:
  PHP_VERSION: "{{.php}}"
