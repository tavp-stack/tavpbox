name: python
display_name: "Python"
description: "Python application server"
version: "1.0.0"
author: TAVP Team
category: stack
icon: "🐍"

components:
  python:
    label: "Python Version"
    type: select
    versions:
      - "3.10"
      - "3.11"
      - "3.12"
    default: "3.12"
    required: true

preset:
  python: "3.12"

provision: scripts/stacks/python.sh

env:
  PYTHON_VERSION: "{{.python}}"
