name: postgres
display_name: "PostgreSQL"
description: "PostgreSQL relational database"
version: "1.0.0"
author: TAVP Team
category: service
icon: "🐘"

components:
  version:
    label: "PostgreSQL Version"
    type: select
    versions:
      - "14"
      - "15"
      - "16"
    default: "16"

preset:
  version: "16"

provision: scripts/services/postgres.sh

defaults:
  database: "app"
  username: "app"
  password: "app"

ports:
  - 5432

env:
  DB_CONNECTION: "pgsql"
  DB_HOST: "127.0.0.1"
  DB_PORT: "5432"
  DB_DATABASE: "{{.database}}"
  DB_USERNAME: "{{.username}}"
  DB_PASSWORD: "{{.password}}"
