name: mariadb
display_name: "MariaDB"
description: "MariaDB relational database"
version: "1.0.0"
author: TAVP Team
category: service
icon: "🗄️"

components:
  version:
    label: "MariaDB Version"
    type: select
    versions:
      - "10.6"
      - "10.11"
      - "11.4"
    default: "11.4"

preset:
  version: "11.4"

provision: scripts/services/mariadb.sh

defaults:
  database: "app"
  username: "app"
  password: "app"

ports:
  - 3306

env:
  DB_CONNECTION: "mysql"
  DB_HOST: "127.0.0.1"
  DB_PORT: "3306"
  DB_DATABASE: "{{.database}}"
  DB_USERNAME: "{{.username}}"
  DB_PASSWORD: "{{.password}}"
